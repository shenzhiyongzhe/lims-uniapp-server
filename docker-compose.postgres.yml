# 可选说明：PostgreSQL 安装在宿主机时使用，勿在容器内用 localhost 指宿主机 PG。
# API 与 PG 同机：DATABASE_URL 使用 host.docker.internal:5432
# 与 docker-compose.yml 叠加示例：
#   docker compose -f docker-compose.yml up -d
# .env 示例：
#   DATABASE_URL=postgresql://lims:PASSWORD@host.docker.internal:5432/lims?schema=public
services:
  api:
    depends_on: []
    environment:
      DATABASE_HOST: host.docker.internal
      DATABASE_PORT: "5432"
      DATABASE_URL: postgresql://${DATABASE_USER:-lims}:${DATABASE_PASSWORD}@host.docker.internal:5432/${DATABASE_NAME:-lims}?schema=public
