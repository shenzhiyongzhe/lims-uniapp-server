# 宿主机 MySQL 仅监听 127.0.0.1 时使用（与 bridge + host.docker.internal 二选一）
# .env 中 DATABASE_URL 主机须为 127.0.0.1，例如：
#   mysql://USER:PASSWORD@127.0.0.1:3306/lims
# 用法：
#   export DOCKER_IMAGE=ghcr.io/<owner>/lims-uniapp-server:tag
#   docker compose -f docker-compose.prod.hostnetwork.yml up -d
services:
  api:
    image: ${DOCKER_IMAGE:?Set DOCKER_IMAGE to ghcr.io/.../lims-uniapp-server:tag}
    container_name: lims-uniapp-server
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      PORT: "3000"
      NODE_ENV: production
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/',r=>{r.resume();process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  uploads_data:
