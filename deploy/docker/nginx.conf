user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # Gzip Compression
    gzip on;
    gzip_disable "msie6";
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # HTTP Server (Port 80)
    server {
        listen 80;
        listen [::]:80;
        server_name www.jindijz.cn; # Replace with your domain in production

        # Static Uploads served directly by Nginx for high performance
        location /uploads/ {
            alias /app/uploads/;
            expires 7d;
            add_header Cache-Control "public, no-transform";
        }

        # Permanent redirect to HTTPS (uncomment when SSL is ready)
        return 301 https://$host$request_uri;

    }

    # HTTPS Server (Port 443) - Uncomment to enable SSL
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name www.jindijz.cn; # Replace with your domain in production
    
        ssl_certificate /etc/letsencrypt/live/www.jindijz.cn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/www.jindijz.cn/privkey.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;
    
        # Modern configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
    
        # NestJS API (strips /api/lims/ prefix)
        location /api/lims/ {
            rewrite ^/api/lims/(.*)$ /$1 break;
            proxy_pass http://api:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # NestJS API & Frontend Reverse Proxy
        location / {
            proxy_pass http://api:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    
        # Static Uploads served directly by Nginx
        location /uploads/ {
            alias /app/uploads/;
            expires 7d;
            add_header Cache-Control "public, no-transform";
        }
    }
}
