# @deprecated 已迁移至 PostgreSQL，请使用宿主机 PG + docker-compose.postgres.yml 或 deploy/postgresql/README.md
# 保留本文件仅供回滚参考，勿再用于新环境。
services:
  mysql:
    image: mysql:8.0
    container_name: lims-mysql-deprecated
    profiles: ["legacy-mysql"]
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${DATABASE_NAME:-lims}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
