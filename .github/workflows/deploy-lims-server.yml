# 构建并推送 ghcr.io/<owner>/lims-uniapp-server ，再通过 SSH 在服务器拉取并重启。
#
# Variables：DEPLOY_HOST, DEPLOY_USER, DEPLOY_PATH（Settings → Secrets and variables → Actions → Variables）
# Secrets：DEPLOY_SSH_KEY
# 未设置 DEPLOY_HOST 时跳过 deploy，仅构建推送镜像，避免 “missing server host”。
# 私有镜像需在服务器 docker login ghcr.io（见 deploy/README.md）。
#
# 本工作流假定仓库根目录即为 lims-uniapp-server（paths 相对仓库根）。

name: Deploy lims-uniapp-server

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'prisma/**'
      - 'prisma.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'nest-cli.json'
      - 'tsconfig*.json'
      - 'Dockerfile'
      - '.dockerignore'
      - 'docker-compose.prod.yml'
      - 'docker-compose.prod.hostnetwork.yml'
      - 'deploy/**'
      - '.github/workflows/deploy-lims-server.yml'
  workflow_dispatch:

env:
  CONTEXT_PATH: ${{ vars.DOCKER_CONTEXT || '.' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'src/**'
              - 'prisma/**'
              - 'prisma.config.ts'
              - 'package.json'
              - 'package-lock.json'
              - 'nest-cli.json'
              - 'tsconfig*.json'
              - 'Dockerfile'
              - '.dockerignore'
              - '.github/workflows/deploy-lims-server.yml'
            deploy:
              - 'deploy/**'
              - 'docker-compose.prod.yml'
              - 'docker-compose.prod.hostnetwork.yml'
              - '.github/workflows/deploy-lims-server.yml'

  build-and-push:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_full_sha: ${{ steps.resolve.outputs.image_full_sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve ghcr.io image name (lowercase owner)
        id: resolve
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE_NAME="ghcr.io/${OWNER_LC}/lims-uniapp-server"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> "$GITHUB_ENV"
          echo "image_full_sha=${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ${{ env.CONTEXT_PATH }}
          file: ${{ env.CONTEXT_PATH }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

  # deploy:
  #   needs: [changes, build-and-push]
  #   runs-on: ubuntu-latest
  #   if: |
  #     (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
  #     vars.DEPLOY_HOST != '' &&
  #     (
  #       github.event_name == 'workflow_dispatch' ||
  #       needs.changes.outputs.deploy == 'true' ||
  #       (needs.changes.outputs.app == 'true' && needs.build-and-push.result == 'success')
  #     ) &&
  #     needs.build-and-push.result != 'failure'
  #   steps:
  #     - name: Resolve deploy image
  #       id: deploy_image
  #       run: |
  #         OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
  #         IMAGE_REPO="ghcr.io/${OWNER_LC}/lims-uniapp-server"
  #         if [ "${{ needs.build-and-push.result }}" = "success" ]; then
  #           echo "image=${IMAGE_REPO}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
  #         else
  #           echo "image=${IMAGE_REPO}:latest" >> "$GITHUB_OUTPUT"
  #         fi

  #     - uses: appleboy/ssh-action@v1.2.0
  #       env:
  #         IMAGE_FULL_SHA: ${{ steps.deploy_image.outputs.image }}
  #         DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
  #       with:
  #         host: ${{ vars.DEPLOY_HOST }}
  #         username: ${{ vars.DEPLOY_USER }}
  #         key: ${{ secrets.DEPLOY_SSH_KEY }}
  #         envs: IMAGE_FULL_SHA,DEPLOY_PATH
  #         script_stop: true
  #         script: |
  #           set -exo pipefail
  #           cd "${DEPLOY_PATH}"
  #           export DOCKER_IMAGE="${IMAGE_FULL_SHA}"
  #           bash deploy/remote-deploy.sh

  deploy-additional-servers:
    needs: [changes, build-and-push]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        server:
          # - name: server-b
          #   host: ${{ vars.DEPLOY_HOST_B }}
          #   path: ${{ vars.DEPLOY_PATH }}
          # - name: server-c
          #   host: ${{ vars.DEPLOY_HOST_C }}
          #   path: ${{ vars.DEPLOY_PATH }}
          - name: server-d
            host: ${{ vars.DEPLOY_HOST_D }}
            path: ${{ vars.DEPLOY_PATH }}
    # matrix 上下文不能在 job 级 if 中使用，host 是否配置在 step 级判断
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.deploy == 'true' ||
        (needs.changes.outputs.app == 'true' && needs.build-and-push.result == 'success')
      ) &&
      needs.build-and-push.result != 'failure'
    steps:
      - name: Resolve deploy image
        if: matrix.server.host != ''
        id: deploy_image
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE_REPO="ghcr.io/${OWNER_LC}/lims-uniapp-server"
          if [ "${{ needs.build-and-push.result }}" = "success" ]; then
            echo "image=${IMAGE_REPO}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "image=${IMAGE_REPO}:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to ${{ matrix.server.name }}
        if: matrix.server.host != ''
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_FULL_SHA: ${{ steps.deploy_image.outputs.image }}
          DEPLOY_PATH: ${{ matrix.server.path }}
        with:
          host: ${{ matrix.server.host }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: IMAGE_FULL_SHA,DEPLOY_PATH
          script_stop: true
          script: |
            set -exo pipefail
            cd "${DEPLOY_PATH}"
            export DOCKER_IMAGE="${IMAGE_FULL_SHA}"
            bash deploy/docker/deploy.sh
