# 构建并推送 ghcr.io/<owner>/lims-uniapp-server ，再通过 SSH 在服务器拉取并重启。
#
# Variables：DEPLOY_HOST, DEPLOY_USER, DEPLOY_PATH（Settings → Secrets and variables → Actions → Variables）
# Secrets：DEPLOY_SSH_PASSWORD
# 未设置 DEPLOY_HOST 时跳过 deploy，仅构建推送镜像，避免 “missing server host”。
# 私有镜像需在服务器 docker login ghcr.io（见 deploy/README.md）。
#
# 本工作流假定仓库根目录即为 lims-uniapp-server（paths 相对仓库根）。
# 若仓库为上层 monorepo，须把本文件放到仓库根 .github/workflows/，并把 paths 改为 monorepo 子目录前缀。

name: Deploy lims-uniapp-server

on:
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "prisma/**"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - ".github/workflows/deploy-lims-server.yml"
  workflow_dispatch:

env:
  CONTEXT_PATH: ${{ vars.DOCKER_CONTEXT || '.' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_full_sha: ${{ steps.resolve.outputs.image_full_sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve ghcr.io image name (lowercase owner)
        id: resolve
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE_NAME="ghcr.io/${OWNER_LC}/lims-uniapp-server"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> "$GITHUB_ENV"
          echo "image_full_sha=${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ env.CONTEXT_PATH }}
          file: ${{ env.CONTEXT_PATH }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      vars.DEPLOY_HOST != ''
    steps:
      - uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_FULL_SHA: ${{ needs.build-and-push.outputs.image_full_sha }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          envs: IMAGE_FULL_SHA,DEPLOY_PATH
          script_stop: true
          script: |
            set -euo pipefail
            log() { printf '%s %s\n' "$(date -u '+%Y-%m-%dT%H:%M:%SZ')" "$*"; }
            cd "${DEPLOY_PATH}"
            export DOCKER_IMAGE="${IMAGE_FULL_SHA}"
            log ">>> [0] context: pwd=$(pwd) user=$(whoami)"
            log ">>> [0] files: docker-compose.prod.yml=$([ -f docker-compose.prod.yml ] && echo ok || echo MISSING) .env=$([ -f .env ] && echo ok || echo MISSING)"
            command -v docker >/dev/null && log ">>> [0] docker: $(docker --version)" || log ">>> [0] docker: NOT FOUND"
            docker compose version 2>/dev/null | sed 's/^/>>> [0] /' || true
            if [ -d "prisma/migrations" ]; then
              log ">>> [0] host prisma/migrations (first 30 entries):"
              ls -la prisma/migrations 2>/dev/null | head -30 || true
            else
              log ">>> [0] host prisma/migrations: (directory missing)"
            fi
            log ">>> [1/5] pull api (${DOCKER_IMAGE})"
            docker compose -f docker-compose.prod.yml pull api
            log ">>> [1b] prisma CLI inside image"
            docker compose -f docker-compose.prod.yml run -T --rm api npx prisma -v 2>&1 | sed 's/^/    /' || true
            log ">>> [1c] prisma migrate status (log only; non-zero may still be OK before deploy)"
            set +e
            docker compose -f docker-compose.prod.yml run -T --rm api npx prisma migrate status 2>&1 | sed 's/^/    /'
            _st=$?
            set -e
            log ">>> [1c] migrate status exit code: ${_st}"
            if [ -d "prisma/migrations" ] && [ "$(ls -A prisma/migrations 2>/dev/null)" ]; then
              log ">>> [2/5] prisma migrate deploy (host has prisma/migrations)"
              docker compose -f docker-compose.prod.yml run -T --rm \
                -e DEBUG="prisma:migrate,prisma:migrateEngine" \
                api npx prisma migrate deploy 2>&1 | sed 's/^/    /'
            else
              log ">>> [2/5] prisma db push (no host prisma/migrations)"
              docker compose -f docker-compose.prod.yml run -T --rm \
                -e DEBUG="prisma:migrate,prisma:migrateEngine" \
                api npx prisma db push 2>&1 | sed 's/^/    /'
            fi
            log ">>> [3/5] compose up -d"
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            log ">>> [4/5] api container status"
            docker compose -f docker-compose.prod.yml ps api 2>&1 | sed 's/^/    /' || true
            log ">>> [5/5] deploy script finished OK"
